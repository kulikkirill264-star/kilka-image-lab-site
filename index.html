<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>OpenAI Chat и генерация изображений</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #121212;
    color: #fff;
    margin: 20px;
  }
  /* Логотип */
  #logo {
    display: flex;
    align-items: center;
    margin-bottom: 20px;
  }
  #logo img {
    width: 60px;
    height: 60px;
    margin-right: 10px;
  }
  #logo h1 {
    font-size: 24px;
  }
  /* Анимация загрузки */
  #loading {
    display: none; /* по умолчанию скрыта */
    margin: 20px 0;
    text-align: center;
  }
  .spinner {
    border: 8px solid #f3f3f3; /* Light grey */
    border-top: 8px solid #3498db; /* Blue */
    border-radius: 50%;
    width: 60px;
    height: 60px;
    animation: spin 1s linear infinite;
    margin: 0 auto;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  /* Остальной стиль */
  textarea {
    width: 100%;
    max-width: 600px;
    height: 100px;
  }
  button {
    display: inline-block;
    margin-top: 10px;
    padding: 10px 20px;
    background-color: #3498db;
    border: none;
    color: white;
    cursor: pointer;
    font-size: 16px;
    border-radius: 4px;
  }
  button:hover {
    background-color: #2980b9;
  }
  #response {
    white-space: pre-wrap;
    background: #222;
    padding: 10px;
    margin-top: 20px;
    max-width: 600px;
    border-radius: 4px;
  }
</style>
</head>
<body>

<!-- Логотип -->
<div id="logo">
  <img src="https://i.imgur.com/your-logo-url.png" alt="Логотип генератора" />
  <h1>Генератор AI</h1>
</div>

<h1>Диалог с OpenAI</h1>

<!-- Кнопка генерации картинки и анимация -->
<div id="loading">
  <div class="spinner"></div>
</div>

<!-- Ввод сообщения -->
<textarea id="input" placeholder="Введите сообщение..."></textarea><br/>
<button id="send">Отправить</button>

<!-- Ответ -->
<h2>Ответ:</h2>
<pre id="response"></pre>

<script>
const sendButton = document.getElementById('send');
const responsePre = document.getElementById('response');
const loadingDiv = document.getElementById('loading');

sendButton.onclick = () => {
  const message = document.getElementById('input').value;
  // Показываем анимацию загрузки
  loadingDiv.style.display = 'block';

  fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message }),
  })
  .then(res => res.json())
  .then(data => {
    responsePre.textContent = data.reply;
  })
  .catch(err => {
    responsePre.textContent = 'Произошла ошибка.';
    console.error(err);
  })
  .finally(() => {
    // Скрываем анимацию
    loadingDiv.style.display = 'none';
  });
};
</script>

</body>
</html>

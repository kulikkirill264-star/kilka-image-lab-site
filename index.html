<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Генерация изображения</title>
</head>
<body>
<h1>Генерация изображения по тексту</h1>
<input type="text" id="prompt" placeholder="Введите описание" style="width: 300px;" />
<button onclick="generateImage()">Создать</button>
<br><br>
<img id="result" src="" alt="Generated Image" style="max-width: 100%; height: auto; display: none;" />

<script>
const apiUrl = 'https://colab.research.google.com/drive/1dpdAa3S3wdqoI2wmZRLh8sHAjA-844qL'; // вставьте сюда ваш URL

function generateImage() {
    const prompt = document.getElementById('prompt').value;
    if (!prompt) {
        alert('Пожалуйста, введите описание');
        return;
    }

    fetch(apiUrl, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({prompt: prompt})
    })
    .then(res => res.blob())
    .then(blob => {
        const url = URL.createObjectURL(blob);
        const img = document.getElementById('result');
        img.src = url;
        img.style.display = 'block';
    })
    .catch(error => {
        alert('Ошибка при генерации изображения');
        console.error(error);
    });
}
</script>
</body>
</html>
